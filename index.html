<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire Tycoon - V27 FIXED</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0b; --surface: #16161a; --gold: #ffd700; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { text-align: center; padding: 10px; background: var(--surface); border-bottom: 2px solid #333; flex-shrink: 0; }
        #dinheiro { font-size: 30px; font-weight: 900; color: var(--primary); }
        
        #tabs { display: flex; background: #000; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2c1a0a 0%, #000 100%); }
        #cookie { 
            width: 160px; height: 160px; 
            background: radial-gradient(circle at 30% 30%, #e2a65a, #b5651d 70%, #8b4513 100%);
            border-radius: 50%; border: 4px solid #3d1f05;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer; transition: transform 0.05s;
        }
        #cookie:active { transform: scale(0.92); }

        #panel { height: 45vh; background: var(--surface); border-top: 2px solid #333; overflow-y: auto; flex-shrink: 0; }
        .content { padding: 10px; display: none; }
        .content.active { display: block; }
        
        .item { background: #1f1f25; margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d35; }
        .item-info b { font-size: 14px; display: block; color: #fff; }
        .item-info small { color: var(--primary); font-size: 11px; }
        .btn-buy { background: var(--primary); color: #000; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; min-width: 80px; cursor: pointer; }
        .btn-buy:disabled { background: #333; color: #666; cursor: not-allowed; }

        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .me { background: rgba(0, 255, 136, 0.15); color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <div id="dinheiro">$ 0</div>
        <div id="stats" style="font-size: 12px; color: #888;">Ganhos: $ <span id="gps">0</span>/s</div>
    </div>

    <div id="tabs">
        <button class="tab-btn active" id="btn-loja" onclick="tab('loja')">LOJA</button>
        <button class="tab-btn" id="btn-rank" onclick="tab('rank')">RANKING</button>
    </div>

    <div id="game-area">
        <div id="cookie" onclick="clicar()"></div>
    </div>

    <div id="panel">
        <div id="loja" class="content active"></div>
        <div id="rank" class="content"></div>
    </div>

    <script>
        let dinheiro = 0; let porClique = 1; let porSegundo = 0; let upgrades = [];
        
        // Criar as 50 melhorias de forma forçada
        function iniciarUpgrades() {
            upgrades = [];
            for(let i=0; i<50; i++) {
                upgrades.push({
                    id: i,
                    nome: "Melhoria " + (i + 1),
                    preco: 15 * Math.pow(1.5, i), 
                    power: (i + 1) * Math.pow(1.4, i), 
                    tipo: i % 5 === 0 ? 'c' : 's',
                    count: 0
                });
            }
        }

        function format(v) {
            if(v >= 1e12) return (v/1e12).toFixed(2) + "T";
            if(v >= 1e9) return (v/1e9).toFixed(2) + "B";
            if(v >= 1e6) return (v/1e6).toFixed(2) + "M";
            return Math.floor(v).toLocaleString();
        }

        function clicar() { dinheiro += porClique; atualizarTela(); }

        function comprar(id) {
            let u = upgrades[id];
            if(dinheiro >= u.preco) {
                dinheiro -= u.preco;
                u.count++;
                if(u.tipo === 'c') porClique += u.power; else porSegundo += u.power;
                u.preco *= 1.5;
                atualizarTela();
                salvar();
            }
        }

        function tab(nome) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(nome).classList.add('active');
            if(nome === 'loja') document.getElementById('btn-loja').classList.add('active');
            if(nome === 'rank') {
                document.getElementById('btn-rank').classList.add('active');
                renderRanking();
            }
        }

        function renderRanking() {
            let r = document.getElementById('rank');
            r.innerHTML = "<h3 style='text-align:center; padding:10px;'>TOP 100 GLOBAL</h3>";
            let bots = [];
            for(let i=0; i<99; i++) { bots.push({ n: "Player_" + (i+10), s: Math.pow(10, 12 - (i/7)) }); }
            bots.push({ n: "VOCÊ", s: dinheiro, me: true });
            bots.sort((a,b) => b.s - a.s).forEach((p, i) => {
                r.innerHTML += `<div class="rank-item ${p.me?'me':''}">#${i+1} ${p.n} <span>$ ${format(p.s)}</span></div>`;
            });
        }

        function atualizarTela() {
            document.getElementById('dinheiro').innerText = "$ " + format(dinheiro);
            document.getElementById('gps').innerText = format(porSegundo);
            let loja = document.getElementById('loja');
            let html = "";
            upgrades.forEach(u => {
                html += `<div class="item">
                    <div class="item-info"><b>${u.nome} (${u.count})</b><small>+${format(u.power)}/s</small></div>
                    <button class="btn-buy" ${dinheiro < u.preco ? 'disabled' : ''} onclick="comprar(${u.id})">${format(u.preco)}</button>
                </div>`;
            });
            loja.innerHTML = html;
        }

        function salvar() {
            localStorage.setItem('cookie_v27_save', JSON.stringify({d: dinheiro, pc: porClique, ps: porSegundo, u: upgrades.map(x => x.count)}));
        }

        function carregar() {
            let s = JSON.parse(localStorage.getItem('cookie_v27_save'));
            if(s) {
                dinheiro = s.d; porClique = s.pc; porSegundo = s.ps;
                s.u.forEach((c, i) => { 
                    upgrades[i].count = c; 
                    for(let j=0; j<c; j++) upgrades[i].preco *= 1.5;
                });
            }
        }

        // Execução inicial
        iniciarUpgrades();
        carregar();
        setInterval(() => { dinheiro += porSegundo/10; atualizarTela(); }, 100);
        atualizarTela();
    </script>
</body>
</html>
