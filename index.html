<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire Tycoon</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0b; --surface: #16161a; --gold: #ffd700; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { text-align: center; padding: 12px; background: var(--surface); border-bottom: 2px solid #333; }
        #game-title { font-size: 14px; color: var(--gold); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        #dinheiro { font-size: 28px; font-weight: 900; color: var(--primary); }
        #stats-bar { display: flex; justify-content: center; gap: 15px; font-size: 11px; color: #888; margin-top: 5px; }
        #tabs { display: flex; background: #000; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: none; color: #555; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        #area-clique { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2c1a0a, #000); }
        #cookie { width: 160px; height: 160px; background: radial-gradient(circle at 35% 35%, #e2a65a, #b5651d); border-radius: 50%; position: relative; box-shadow: 0 10px 0 #5d2e0a, 0 15px 30px rgba(0,0,0,0.8); transition: transform 0.05s; }
        #cookie:active { transform: scale(0.92) translateY(5px); }
        #panel { height: 45vh; background: var(--surface); border-top: 2px solid #333; overflow-y: auto; padding: 10px; }
        .item { background: #1f1f25; margin-bottom: 8px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d35; }
        .item-info { display: flex; flex-direction: column; }
        .btn-buy { background: var(--primary); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: 800; min-width: 90px; }
        .btn-buy:disabled { background: #2d2d35; color: #555; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 12px; }
        .me { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div id="game-title">Cookie Empire Tycoon</div>
        <div id="dinheiro">$ 0</div>
        <div id="stats-bar"><span id="gps">LUCRO: $ 0/s</span></div>
    </div>
    <div id="tabs">
        <button class="tab-btn active" onclick="tab('loja')">LOJA (50)</button>
        <button class="tab-btn" onclick="tab('rank')">RANKING</button>
    </div>
    <div id="area-clique"><div id="cookie" onclick="clicar()"></div></div>
    <div id="panel">
        <div id="loja-cont"></div>
        <div id="rank-cont" style="display:none"></div>
    </div>

    <script>
        let game = { dinheiro: 0, porClique: 1, porSegundo: 0, upgrades: [] };
        const nomes = ["Dedo", "Vovó", "Padaria", "Fábrica", "Banco", "Mina", "Portal", "Nave", "Estrela", "Buraco Negro"];
        const adjs = ["Bronze", "Aço", "Ouro", "Platina", "Diamante"];

        // Criando os 50 Upgrades
        for(let i=0; i<50; i++) {
            game.upgrades.push({
                id: i,
                nome: adjs[Math.floor(i/10)] + " " + nomes[i%10],
                preco: 15 * Math.pow(2.2, i),
                power: (i+1) * Math.pow(2.5, i),
                tipo: i%5==0 ? 'c' : 's',
                count: 0
            });
        }

        function format(n) {
            if (n >= 1e12) return (n/1e12).toFixed(2) + "T";
            if (n >= 1e9) return (n/1e9).toFixed(1) + "B";
            if (n >= 1e6) return (n/1e6).toFixed(1) + "M";
            return Math.floor(n).toLocaleString();
        }

        function clicar() { game.dinheiro += game.porClique; update(); }
        
        function comprar(id) {
            let u = game.upgrades[id];
            if(game.dinheiro >= u.preco) {
                game.dinheiro -= u.preco; u.count++;
                if(u.tipo == 'c') game.porClique += u.power; else game.porSegundo += u.power;
                u.preco *= 1.6; update();
            }
        }

        function tab(t) {
            document.getElementById('loja-cont').style.display = t=='loja'?'block':'none';
            document.getElementById('rank-cont').style.display = t=='rank'?'block':'none';
            if(t=='rank') renderRank();
        }

        function update() {
            document.getElementById('dinheiro').innerText = "$ " + format(game.dinheiro);
            document.getElementById('gps').innerText = "LUCRO: $ " + format(game.porSegundo) + "/s";
            let l = document.getElementById('loja-cont'); l.innerHTML = "";
            game.upgrades.forEach(u => {
                l.innerHTML += `<div class="item">
                    <div class="item-info"><b>${u.nome}</b><small>Qtd: ${u.count}</small></div>
                    <button class="btn-buy" ${game.dinheiro<u.preco?'disabled':''} onclick="comprar(${u.id})">${format(u.preco)}</button>
                </div>`;
            });
        }

        function renderRank() {
            let r = document.getElementById('rank-cont');
            r.innerHTML = "<h3 style='text-align:center'>RANKING GLOBAL</h3>";
            let fakeRank = [{n:"Imperador", s:1e15}, {n:"Tu (Império)", s:game.dinheiro, me:true}, {n:"Padeiro", s:1000}];
            fakeRank.sort((a,b) => b.s - a.s).forEach((p, i) => {
                r.innerHTML += `<div class="rank-item ${p.me?'me':''}">#${i+1} ${p.n} <span>$ ${format(p.s)}</span></div>`;
            });
        }

        setInterval(() => { game.dinheiro += game.porSegundo/10; update(); }, 100);
        update();
    </script>
</body>
</html>
