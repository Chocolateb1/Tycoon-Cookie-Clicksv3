<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire - Velocidade Ajustada</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0b; --surface: #16161a; --gold: #ffd700; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { text-align: center; padding: 15px; background: var(--surface); border-bottom: 2px solid #333; flex-shrink: 0; }
        #dinheiro { font-size: 32px; font-weight: 900; color: var(--primary); transition: 0.2s; }
        
        #tabs { display: flex; background: #000; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2c1a0a 0%, #000 100%); }
        #cookie { 
            width: 160px; height: 160px; 
            background: radial-gradient(circle at 30% 30%, #e2a65a, #b5651d 70%, #8b4513 100%);
            border-radius: 50%; border: 4px solid #3d1f05;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer; transition: transform 0.05s;
        }
        #cookie:active { transform: scale(0.92); }

        #panel { height: 45vh; background: var(--surface); border-top: 2px solid #333; overflow-y: auto; flex-shrink: 0; }
        .content { padding: 12px; display: none; }
        .content.active { display: block; }
        
        .item { background: #1f1f25; margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d35; }
        .item-info b { font-size: 15px; display: block; margin-bottom: 2px; }
        .item-info small { color: var(--primary); font-size: 12px; }
        .btn-buy { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; min-width: 90px; cursor: pointer; }
        .btn-buy:disabled { background: #333; color: #777; cursor: not-allowed; }

        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; }
        .me { background: rgba(0, 255, 136, 0.1); color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <div id="dinheiro">$ 0</div>
        <div id="stats" style="font-size: 13px; color: #888; margin-top: 5px;">Lucro: $ <span id="gps">0</span>/s</div>
    </div>

    <div id="tabs">
        <button class="tab-btn active" id="t-loja" onclick="tab('loja')">LOJA</button>
        <button class="tab-btn" id="t-rank" onclick="tab('rank')">RANKING</button>
    </div>

    <div id="game-area">
        <div id="cookie" onclick="clicar()"></div>
    </div>

    <div id="panel">
        <div id="loja" class="content active"></div>
        <div id="rank" class="content"></div>
    </div>

    <script>
        let dinheiro = 0; let porClique = 1; let porSegundo = 0; let upgrades = [];
        
        function init() {
            for(let i=0; i<50; i++) {
                upgrades.push({
                    id: i,
                    nome: "Empresa " + (i + 1),
                    preco: 15 * Math.pow(1.5, i), 
                    power: (i + 1) * Math.pow(1.4, i), 
                    tipo: i % 5 === 0 ? 'c' : 's',
                    count: 0
                });
            }
            load();
            updateUI();
        }

        function format(v) {
            if(v >= 1e12) return (v/1e12).toFixed(2) + "T";
            if(v >= 1e9) return (v/1e9).toFixed(2) + "B";
            if(v >= 1e6) return (v/1e6).toFixed(2) + "M";
            return Math.floor(v).toLocaleString();
        }

        function clicar() { 
            dinheiro += porClique; 
            updateUI(); 
        }

        function comprar(id) {
            let u = upgrades[id];
            if(dinheiro >= u.preco) {
                dinheiro -= u.preco;
                u.count++;
                if(u.tipo === 'c') porClique += u.power; else porSegundo += u.power;
                u.preco *= 1.5;
                updateUI();
                save();
            }
        }

        function tab(n) {
            document.querySelectorAll('.content, .tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(n).classList.add('active');
            document.getElementById('t-'+n).classList.add('active');
            if(n === 'rank') renderRank();
        }

        function renderRank() {
            let r = document.getElementById('rank');
            r.innerHTML = "<h3 style='text-align:center; padding:10px; color:var(--gold)'>TOP 100 GLOBAL</h3>";
            let bots = [];
            for(let i=0; i<99; i++) { bots.push({ n: "Bot_"+(i+1), s: Math.pow(10, 12 - (i/8)) }); }
            bots.push({ n: "VOCÊ", s: dinheiro, me: true });
            bots.sort((a,b) => b.s - a.s).forEach((p, i) => {
                r.innerHTML += `<div class="rank-item ${p.me?'me':''}">#${i+1} ${p.n} <span>$ ${format(p.s)}</span></div>`;
            });
        }

        function updateUI() {
            document.getElementById('dinheiro').innerText = "$ " + format(dinheiro);
            document.getElementById('gps').innerText = format(porSegundo);
            let loja = document.getElementById('loja');
            let html = "";
            upgrades.forEach(u => {
                html += `<div class="item">
                    <div class="item-info"><b>${u.nome} (${u.count})</b><small>+${format(u.power)}${u.tipo=='c'?'/clique':'/s'}</small></div>
                    <button class="btn-buy" ${dinheiro < u.preco ? 'disabled' : ''} onclick="comprar(${u.id})">${format(u.preco)}</button>
                </div>`;
            });
            loja.innerHTML = html;
        }

        function save() {
            localStorage.setItem('cookie_save_final', JSON.stringify({d: dinheiro, pc: porClique, ps: porSegundo, u: upgrades.map(x => x.count)}));
        }

        function load() {
            let s = JSON.parse(localStorage.getItem('cookie_save_final'));
            if(s) {
                dinheiro = s.d; porClique = s.pc; porSegundo = s.ps;
                s.u.forEach((c, i) => { 
                    upgrades[i].count = c; 
                    for(let j=0; j<c; j++) upgrades[i].preco *= 1.5;
                });
            }
        }

        // Loop de ganhos: Agora atualiza a cada 1 segundo (mais devagar)
        setInterval(() => { 
            if(porSegundo > 0) {
                dinheiro += porSegundo; 
                updateUI(); 
            }
        }, 1000); 

        // Salva automaticamente a cada 10 segundos
        setInterval(save, 10000);

        init();
    </script>
</body>
</html>
