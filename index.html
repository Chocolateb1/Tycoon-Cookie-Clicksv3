<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire Tycoon V28</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0b; --surface: #16161a; --gold: #ffd700; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { text-align: center; padding: 15px; background: var(--surface); border-bottom: 2px solid #333; }
        #dinheiro { font-size: 32px; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px rgba(0,255,136,0.4); }
        #gps-display { font-size: 12px; color: #888; margin-top: 5px; text-transform: uppercase; }
        #tabs { display: flex; background: #000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; font-weight: bold; font-size: 14px; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        #area-clique { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2c1a0a 0%, #000 100%); position: relative; }
        #cookie { width: 170px; height: 170px; background: radial-gradient(circle at 35% 35%, #e2a65a 0%, #b5651d 80%); border-radius: 50%; box-shadow: 0 10px 0 #5d2e0a, 0 20px 40px rgba(0,0,0,0.6); cursor: pointer; transition: transform 0.05s; }
        #cookie:active { transform: scale(0.92) translateY(5px); }
        #panel { height: 45vh; background: var(--surface); border-top: 2px solid #333; overflow-y: auto; }
        .content { padding: 10px; display: none; }
        .content.active { display: block; }
        .item { background: #1f1f25; margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d35; }
        .item-info b { display: block; font-size: 14px; color: #eee; }
        .item-info small { color: var(--primary); font-size: 11px; }
        .btn-buy { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; min-width: 100px; }
        .btn-buy:disabled { opacity: 0.2; }
        .rank-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        .me { background: rgba(255, 215, 0, 0.1); color: var(--gold); font-weight: bold; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>
    <div id="header">
        <div id="dinheiro">$ 0</div>
        <div id="gps-display">Lucro: $ <span id="gps">0</span>/s</div>
    </div>
    <div id="tabs">
        <button class="tab-btn active" onclick="tab('loja', this)">LOJA (50)</button>
        <button class="tab-btn" onclick="tab('rank', this)">RANKING</button>
    </div>
    <div id="area-clique"><div id="cookie" onclick="clicar()"></div></div>
    <div id="panel">
        <div id="loja" class="content active"></div>
        <div id="rank" class="content"></div>
    </div>
    <script>
        let dinheiro = 0; let porClique = 1; let porSegundo = 0; let upgrades = [];
        const n = ["Cursor", "Vovó", "Padaria", "Fábrica", "Mina", "Banco", "Nave", "Portal", "Laboratório", "Deus"];
        const a = ["Bronze", "Ferro", "Aço", "Ouro", "Platina"];
        for(let i=0; i<50; i++) {
            upgrades.push({ id: i, nome: a[Math.floor(i/10)]+" "+n[i%10], preco: 15*Math.pow(2.15, i), power: (i+1)*Math.pow(2.45, i), tipo: i%5==0?'c':'s', count: 0 });
        }
        function format(v) { 
            if(v >= 1e12) return (v/1e12).toFixed(2)+"T";
            if(v >= 1e9) return (v/1e9).toFixed(2)+"B";
            if(v >= 1e6) return (v/1e6).toFixed(2)+"M";
            return Math.floor(v).toLocaleString(); 
        }
        function clicar() { dinheiro += porClique; update(); }
        function comprar(id) {
            let u = upgrades[id];
            if(dinheiro >= u.preco) {
                dinheiro -= u.preco; u.count++;
                if(u.tipo=='c') porClique += u.power; else porSegundo += u.power;
                u.preco *= 1.65; update();
            }
        }
        function tab(t, b) {
            document.querySelectorAll('.content, .tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(t).classList.add('active'); b.classList.add('active');
            if(t=='rank') {
                let r = document.getElementById('rank'); r.innerHTML = "<h3 style='text-align:center;color:var(--gold)'>TOP MUNDIAL</h3>";
                let bots = [{n:"Lenda Carioca", s:1e15}, {n:"Tu (Império)", s:dinheiro, m:true}, {n:"Padeiro Noob", s:500}];
                bots.sort((x,y)=>y.s-x.s).forEach((p,i)=>{
                    r.innerHTML += `<div class="rank-item ${p.m?'me':''}">#${i+1} ${p.n} <span>$ ${format(p.s)}</span></div>`;
                });
            }
        }
        function update() {
            document.getElementById('dinheiro').innerText = "$ " + format(dinheiro);
            document.getElementById('gps').innerText = format(porSegundo);
            let l = document.getElementById('loja'); l.innerHTML = "";
            upgrades.forEach(u => {
                l.innerHTML += `<div class="item"><div class="item-info"><b>${u.nome}</b><small>Qtd: ${u.count} | +${format(u.power)}${u.tipo=='c'?'/clique':'/s'}</small></div>
                <button class="btn-buy" ${dinheiro<u.preco?'disabled':''} onclick="comprar(${u.id})">${format(u.preco)}</button></div>`;
            });
        }
        setInterval(() => { dinheiro += porSegundo/10; update(); }, 100);
        update();
    </script>
</body>
</html>
