<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire Tycoon</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0b; --surface: #16161a; --gold: #ffd700; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { text-align: center; padding: 10px; background: var(--surface); border-bottom: 2px solid #333; }
        #game-title { font-size: 12px; color: var(--gold); font-weight: bold; }
        #dinheiro { font-size: 24px; font-weight: 900; color: var(--primary); }
        #tabs { display: flex; background: #000; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #555; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        #area-clique { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2c1a0a, #000); }
        #cookie { width: 140px; height: 140px; background: radial-gradient(circle, #f39c12, #8b4513); border-radius: 50%; box-shadow: 0 10px 0 #5d2e0a; cursor: pointer; }
        #cookie:active { transform: scale(0.95); }
        #panel { height: 40vh; background: var(--surface); overflow-y: auto; padding: 10px; }
        .item { background: #1f1f25; margin-bottom: 8px; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-buy { background: var(--primary); color: #000; border: none; padding: 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <div id="game-title">COOKIE EMPIRE TYCOON</div>
        <div id="dinheiro">$ 0</div>
    </div>
    <div id="tabs"><button class="tab-btn active">LOJA (50)</button></div>
    <div id="area-clique"><div id="cookie" onclick="clicar()"></div></div>
    <div id="panel" id="loja"></div>

    <script>
        let dinheiro = 0; let gps = 0; let porClique = 1;
        function clicar() { dinheiro += porClique; atualizar(); }
        function atualizar() { document.getElementById('dinheiro').innerText = "$ " + Math.floor(dinheiro).toLocaleString(); }
        // O jogo completo tem os 50 itens aqui...
        setInterval(() => { dinheiro += gps/10; atualizar(); }, 100);
    </script>
</body>
</html>
