<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
}
</style>
<title>FPS Mobile 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    font-size:20px;
}

#crosshair{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:35px;
    z-index:10;
}

#shootBtn{
    position:absolute;
    bottom:40px;
    right:40px;
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    font-size:35px;
    z-index:20;
}

.weaponBtn{
    position:absolute;
    bottom:40px;
    width:50px;
    height:50px;
    font-size:20px;
    z-index:20;
}

#gun1{left:20px;}
#gun2{left:80px;}
#gun3{left:140px;}
</style>
</head>

<body>

<div id="hud">
Vida: 100<br>
Arma: <span id="weapon">Rifle</span><br>
Munição: <span id="ammo">30</span>
</div>

<div id="crosshair">+</div>

<button id="shootBtn">🔫</button>

<button class="weaponBtn" id="gun1">1</button>
<button class="weaponBtn" id="gun2">2</button>
<button class="weaponBtn" id="gun3">3</button>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x444444})
);

floor.rotation.x = -Math.PI/2;
scene.add(floor);

for(let i=0;i<40;i++){
    const wall = new THREE.Mesh(
    new THREE.BoxGeometry(5,5,5),
    new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );

    wall.position.set(
    Math.random()*150-75,
    2.5,
    Math.random()*150-75
    );

    scene.add(wall);
}

const enemies=[];

function createEnemy(){
    const enemy = new THREE.Mesh(
    new THREE.BoxGeometry(2,4,2),
    new THREE.MeshStandardMaterial({color:0xff0000})
    );

    enemy.position.set(
    Math.random()*100-50,
    2,
    Math.random()*100-50
    );

    enemy.health=100;

    scene.add(enemy);
    enemies.push(enemy);
}

for(let i=0;i<10;i++) createEnemy();

camera.position.y=2;

const weapons=[
{name:"Rifle",ammo:30,damage:25},
{name:"Shotgun",ammo:8,damage:60},
{name:"Sniper",ammo:5,damage:100}
];

let currentWeapon=0;

function updateHUD(){
document.getElementById("weapon").innerText=weapons[currentWeapon].name;
document.getElementById("ammo").innerText=weapons[currentWeapon].ammo;
}

updateHUD();

function shoot(){
let weapon=weapons[currentWeapon];

if(weapon.ammo<=0) return;

weapon.ammo--;
updateHUD();

const raycaster = new THREE.Raycaster();
raycaster.setFromCamera(new THREE.Vector2(0,0),camera);

const hits = raycaster.intersectObjects(enemies);

if(hits.length>0){
const enemy = hits[0].object;
enemy.health -= weapon.damage;

if(enemy.health<=0){
scene.remove(enemy);
enemies.splice(enemies.indexOf(enemy),1);
createEnemy();
}
}
}

document.getElementById("shootBtn").addEventListener("touchstart",shoot);

document.getElementById("gun1").onclick=()=>{
currentWeapon=0;
updateHUD();
};

document.getElementById("gun2").onclick=()=>{
currentWeapon=1;
updateHUD();
};

document.getElementById("gun3").onclick=()=>{
currentWeapon=2;
updateHUD();
};

let touchX=0;
let touchY=0;

window.addEventListener("touchstart",(e)=>{
touchX=e.touches[0].clientX;
touchY=e.touches[0].clientY;
});

window.addEventListener("touchmove",(e)=>{
let dx=e.touches[0].clientX-touchX;
let dy=e.touches[0].clientY-touchY;

camera.rotation.y -= dx*0.01;

camera.position.x -= Math.sin(camera.rotation.y)*dy*0.05;
camera.position.z -= Math.cos(camera.rotation.y)*dy*0.05;

touchX=e.touches[0].clientX;
touchY=e.touches[0].clientY;
});

function animate(){
requestAnimationFrame(animate);

enemies.forEach(enemy=>{
enemy.lookAt(camera.position);

let dx = camera.position.x-enemy.position.x;
let dz = camera.position.z-enemy.position.z;

let dist = Math.sqrt(dx*dx+dz*dz);

if(dist>2){
enemy.position.x += dx/dist*0.02;
enemy.position.z += dz/dist*0.02;
}
});

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
